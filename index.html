<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Apps Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 40px 20px;
      color: #1f2933;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6b7280;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .app-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px 18px 18px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 140px;
    }
    .app-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .app-desc {
      font-size: 14px;
      color: #6b7280;
      margin: 0 0 12px;
    }
    .launch-btn {
      align-self: flex-start;
      display: inline-block;
      padding: 9px 18px;
      background: #0078ff;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0, 120, 255, 0.45);
      transition: 0.18s ease-in-out;
    }
    .launch-btn:hover {
      background: #005fcc;
      box-shadow: 0 0 16px rgba(0, 120, 255, 0.7);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Apps</h1>
    <p class="subtitle">Click <strong>Launch</strong> next to any app to open it in a new tab.</p>

    <div class="grid">
      <!-- App 1 -->
      <div class="app-card">
        <div>
          <h2 class="app-title">App One</h2>
          <p class="app-desc">Short description of what this app does.</p>
        </div>
        <!-- Change the href to your app’s path -->
        <a href="/app-one/" target="_blank" class="launch-btn">Launch</a>
      </div>

      <!-- App 2 -->
      <div class="app-card">
        <div>
          <h2 class="app-title">App Two</h2>
          <p class="app-desc">Another app description goes here.</p>
        </div>
        <!-- Example if the main file is app-two.html in the root -->
        <a href="/app-two.html" target="_blank" class="launch-btn">Launch</a>
      </div>

      <!-- App 3 -->
      <div class="app-card">
        <div>
          <h2 class="app-title">App Three</h2>
          <p class="app-desc">Describe this app in one sentence.</p>
        </div>
        <!-- Example if the app is in folder /tools/app-three/ -->
        <a href="/tools/app-three/" target="_blank" class="launch-btn">Launch</a>
      </div>

      <!-- Duplicate one of these blocks for more apps -->
      <!--
      <div class="app-card">
        <div>
          <h2 class="app-title">App Name</h2>
          <p class="app-desc">Short description.</p>
        </div>
        <a href="/path-to-your-app/" target="_blank" class="launch-btn">Launch</a>
      </div>
      -->
    </div>
  </div>
</body>
</html>
